services:
  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service/models:/app/models
      - ./ai-service/dataset:/app/dataset

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/worldcup_prediction
      CLIENT_URL: http://localhost:5173
      AI_SERVICE_URL: http://ai-service:8000
      FOOTBALL_DATA_API_KEY: your_football_data_api_key
      JWT_SECRET: change_this_secret
    depends_on:
      - mongo
      - ai-service

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
